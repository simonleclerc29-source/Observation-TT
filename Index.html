<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPS Vibe - Analyse Tactique Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .net-v { background-color: rgba(255,255,255,0.9); width: 10px; height: 100%; position: absolute; left: 0; z-index: 20; pointer-events: none; border-right: 3px solid rgba(0,0,0,0.2); }
        .line-v { border-left: 2px dashed rgba(255,255,255,0.4); height: 100%; position: absolute; top: 0; pointer-events: none; z-index: 4; }
        .line-h { border-top: 2px dashed rgba(255,255,255,0.4); width: 100%; position: absolute; left: 0; pointer-events: none; z-index: 4; }
        .table-container { width: 100%; aspect-ratio: 1.6 / 1; max-width: 650px; margin: 0 auto; position: relative; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <header class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <h1 class="font-800 text-xl tracking-tighter text-blue-600 flex items-center gap-2 italic">
            EPS VIBE <span class="text-[10px] bg-blue-100 px-2 py-0.5 rounded-full text-blue-700 font-bold uppercase">Table</span>
        </h1>
        <div class="text-xs font-bold text-slate-400 uppercase italic">Analyse Tactique MARQUIS</div>
    </header>

    <main class="flex-1 p-4 max-w-6xl mx-auto w-full">
        <section id="tab-ping">
            <!-- VUE : SAISIE DES IMPACTS -->
            <div id="game-view" class="flex flex-col items-center space-y-6 fade-in">
                <div class="text-center">
                    <h2 class="text-2xl font-900 text-slate-800 uppercase italic tracking-tighter">Impacts Balles</h2>
                    <p class="text-slate-500 font-medium italic">Cliquez sur la zone d'impact (<span id="counter" class="text-blue-600 font-bold">0</span>/10)</p>
                </div>

                <div class="table-container bg-blue-700 rounded-r-xl overflow-hidden border-y-[8px] border-r-[8px] border-white shadow-2xl relative">
                    <div class="net-v"></div>
                    <div class="line-v" style="left: 50%;"></div>
                    <div class="line-h" style="top: 25%;"></div>
                    <div class="line-h" style="top: 50%;"></div>
                    <div class="line-h" style="top: 75%;"></div>
                    <canvas id="pingCanvas" class="w-full h-full cursor-crosshair relative z-10"></canvas>
                </div>
                
                <div class="flex justify-between w-full max-w-md text-[10px] text-slate-400 font-bold uppercase px-2 tracking-widest">
                    <span>⬅ Filet</span>
                    <span>Fond de table ➔</span>
                </div>

                <button onclick="clearGame()" class="px-8 py-3 bg-slate-200 text-slate-600 font-bold rounded-2xl hover:bg-slate-300 transition-colors uppercase text-sm italic">Réinitialiser</button>
            </div>

            <!-- VUE : BILAN -->
            <div id="stats-view" class="hidden max-w-4xl mx-auto fade-in">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100">
                    <h2 class="text-3xl font-900 text-slate-900 text-center uppercase italic mb-8">Bilan de l'observation</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                        <div id="stats-list" class="space-y-2"></div>
                        <div class="bg-blue-600 p-8 rounded-[2rem] text-white flex flex-col items-center justify-center text-center shadow-xl">
                            <span class="text-xs font-bold uppercase opacity-80 mb-2 italic">Zone Majoritaire</span>
                            <p id="best-zone-name" class="font-900 text-2xl uppercase italic tracking-tighter">Analyse...</p>
                        </div>
                    </div>
                    <button onclick="goToSituation()" class="w-full py-6 bg-green-600 hover:bg-green-700 text-white rounded-3xl font-900 text-xl shadow-xl transition-all uppercase italic">Voir ma situation de remédiation</button>
                </div>
            </div>

            <!-- VUE : FICHE DE REMÉDIATION (INTÉGRALE DU DOC) -->
            <div id="situation-view" class="hidden max-w-4xl mx-auto fade-in">
                <div class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-2xl border-t-[12px] border-green-500 overflow-y-auto max-h-[85vh]">
                    <h2 id="situ-title" class="text-3xl font-900 text-slate-900 mb-2 italic tracking-tighter uppercase">Titre</h2>
                    <h3 id="situ-objectif" class="text-blue-600 font-bold text-sm mb-6 uppercase italic tracking-wide underline underline-offset-4">Objectif</h3>
                    
                    <div class="space-y-6">
                        <div>
                            <h4 class="font-black text-slate-400 text-[10px] uppercase mb-1">Le constat</h4>
                            <p id="situ-constat" class="text-slate-700 text-sm leading-relaxed"></p>
                        </div>

                        <div class="bg-blue-50 p-5 rounded-2xl border-l-4 border-blue-500">
                            <h4 class="font-black text-blue-900 text-[10px] uppercase mb-1 italic">La stratégie</h4>
                            <p id="situ-strategie" class="text-slate-700 text-sm font-semibold italic"></p>
                        </div>

                        <div class="bg-white border-2 border-slate-100 p-5 rounded-2xl">
                            <h4 class="font-black text-slate-900 text-[10px] uppercase mb-2">La routine (Coopératif)</h4>
                            <div id="situ-routine" class="text-slate-600 text-sm space-y-2 mb-3"></div>
                            <div id="situ-variable" class="p-3 bg-amber-50 rounded-xl text-amber-900 text-xs font-bold border border-amber-100"></div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-green-50 p-5 rounded-2xl border-l-4 border-green-500">
                                <h4 class="font-black text-green-900 text-[10px] uppercase mb-2 italic">Pour réussir je dois</h4>
                                <ul id="situ-conseils" class="text-slate-700 text-xs list-disc pl-4 space-y-1"></ul>
                            </div>
                            <div class="bg-slate-900 p-5 rounded-2xl shadow-lg">
                                <h4 class="font-black text-slate-400 text-[10px] uppercase mb-2 italic">Critère de réussite</h4>
                                <p id="situ-reussite" class="text-white text-xs font-bold italic"></p>
                            </div>
                        </div>
                    </div>

                    <button onclick="clearGame()" class="mt-8 w-full py-4 bg-slate-200 text-slate-800 rounded-2xl font-black uppercase tracking-tighter text-sm hover:bg-slate-300 transition-all">Nouvelle observation</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        let count = 0;
        let impacts = Array(8).fill(0);
        
        // Configuration spatiale : Col 0 (Court 0-50%), Col 1 (Fond 50-100%)
        const zoneDisplayNames = [
            "Court Gauche", "Milieu Court Gauche", "Milieu Court Droit", "Court Droit",
            "Fond Gauche", "Milieu Fond Gauche", "Milieu Fond Droit", "Fond Droit"
        ];

        // Intégration totale du document ODT
        const situations = [
            { 
                title: "Court gauche", 
                objectif: "Maîtriser la rupture de profondeur",
                constat: "Tu marques tes points grâce à des balles coupées à gauche, mais ton jeu manque encore de variation vers le fond de table.",
                strategie: "Utilise ton point fort (la balle coupée courte à gauche) pour surprendre l'adversaire en enchaînant immédiatement avec une balle longue et tendue au même endroit.",
                routine: ["Je sers.", "Remise adverse.", "Ton coup : Coupé court à gauche.", "Remise adverse.", "Ton coup : Balle longue en fond de table à gauche (place une feuille de papier dans le coin pour t’aider à visualiser)."],
                variable: "Après la balle courte, vise le coin opposé (fond de table à droite).",
                conseils: ["Garde les jambes légèrement fléchies pour une meilleure poussée.", "Accompagne ton geste jusqu'au bout pour donner de la longueur."],
                reussite: "Réaliser cet enchaînement 5 fois d'affilée sans faute."
            },
            { 
                title: "Milieu court gauche", 
                objectif: "Maîtriser le placement latéral pour déplacer l'adversaire",
                constat: "Ton jeu est trop centré. En ne jouant qu'au milieu de la table, tu ne mets pas assez ton adversaire en difficulté et tu lui laisses trop de confort.",
                strategie: "Apprends à écarter le jeu pour forcer ton adversaire à se déplacer (droite et gauche).",
                routine: ["Installe des feuilles de papier sur toute la zone centrale de la table pour ne laisser libres que les 'couloirs' extérieurs.", "Je sers.", "Remise adverse.", "J'enchaîne : je place une balle à droite, puis une balle à gauche. Mon partenaire doit rester passif."],
                variable: "Ajoute de l'effet lifté (topspin) pour accélérer la balle et obliger ton adversaire à se déplacer plus vite.",
                conseils: ["Orienter mes épaules vers la zone visée au moment de l'impact.", "Accompagne ton geste jusqu'au bout pour donner de la longueur.", "Pour l'effet lifté : frotte la balle sur le dessus (roue de vélo) et pousse sur tes jambes."],
                reussite: "Réaliser cet enchaînement sur plus de 4 balles 3 fois d’affilées."
            },
            { 
                title: "Milieu court droit", 
                objectif: "Maîtriser le placement latéral pour déplacer l'adversaire",
                constat: "Ton jeu est trop centré. En ne jouant qu'au milieu de la table, tu ne mets pas assez ton adversaire en difficulté et tu lui laisses trop de confort.",
                strategie: "Apprends à écarter le jeu pour forcer ton adversaire à se déplacer (droite et gauche).",
                routine: ["Installe des feuilles de papier sur toute la zone centrale.", "Je sers / Remise adverse.", "J'enchaîne : une balle à droite, puis une balle à gauche. Partenaire passif."],
                variable: "Ajoute de l'effet lifté (topspin) pour accélérer la balle.",
                conseils: ["Orienter mes épaules vers la zone visée.", "Accompagne ton geste jusqu'au bout.", "Frotte la balle sur le dessus et pousse sur tes jambes."],
                reussite: "Réaliser cet enchaînement sur plus de 4 balles 3 fois d’affilées."
            },
            { 
                title: "Court droit", 
                objectif: "Maîtriser la rupture de profondeur",
                constat: "Tu marques tes points grâce à des balles coupées à droite, mais ton jeu manque encore de variation vers le fond de table.",
                strategie: "Utilise ton point fort (la balle coupée courte à droite) pour surprendre l'adversaire en enchaînant immédiatement avec une balle longue et tendue au même endroit.",
                routine: ["Je sers.", "Remise adverse.", "Ton coup : Coupé court à droite.", "Remise adverse.", "Ton coup : Balle longue en fond de table à droite (visualise avec une feuille de papier)."],
                variable: "Après la balle courte, vise le coin opposé (fond de table à gauche).",
                conseils: ["Garde les jambes légèrement fléchies pour une meilleure poussée.", "Accompagne ton geste jusqu'au bout pour donner de la longueur."],
                reussite: "Réaliser cet enchaînement 5 fois d'affilée sans faute."
            },
            { 
                title: "Fond gauche", 
                objectif: "Maîtriser la rupture de profondeur (Long vers Court)",
                constat: "Tu joues essentiellement en fond de table à gauche. Ton adversaire s'habitue à ta longueur de balle et reste confortablement à distance.",
                strategie: "Fixe ton adversaire au fond de la table avec une balle longue, puis crée une rupture brutale avec un coupé à gauche pour le prendre de vitesse.",
                routine: ["Je sers.", "Remise adverse.", "Ton coup : Balle longue en fond de table à gauche.", "Remise adverse.", "Ton coup : Coupé à gauche, juste derrière le filet (visualise avec une feuille)."],
                variable: "Après ta balle longue au fond gauche, joue ton coupé dans le côté opposé (court à droite).",
                conseils: ["Garde les jambes fléchies pour basculer ton poids vers l'avant lors du coupé.", "Pour le coupé : palette parallèle à la table, frotte par-dessous, mouvement sec (pas de bruit)."],
                reussite: "Réaliser cet enchaînement 5 fois d'affilée sans faute."
            },
            { 
                title: "Milieu fond gauche", 
                objectif: "Maîtriser le placement latéral pour déplacer l'adversaire",
                constat: "Ton jeu est trop centré. En ne jouant qu'au milieu de la table, tu ne mets pas assez ton adversaire en difficulté.",
                strategie: "Apprends à écarter le jeu pour forcer ton adversaire à se déplacer.",
                routine: ["Feuilles de papier sur la zone centrale, seuls les couloirs extérieurs sont libres.", "Je sers / Remise adverse.", "Placement alterné droite puis gauche."],
                variable: "Ajoute de l'effet latéral pour obliger ton adversaire à se déplacer plus vite.",
                conseils: ["Orienter mes épaules vers la zone visée.", "Accompagne ton geste jusqu'au bout.", "Effet latéral : jambes fléchies, raquette relâchée, frotte la balle sur le côté."],
                reussite: "Réaliser cet enchaînement sur plus de 4 balles 3 fois d’affilées."
            },
            { 
                title: "Milieu fond droit", 
                objectif: "Maîtriser le placement latéral pour déplacer l'adversaire",
                constat: "Ton jeu est trop centré. En ne jouant qu'au milieu de la table, tu ne mets pas assez ton adversaire en difficulté.",
                strategie: "Apprends à écarter le jeu pour forcer ton adversaire à se déplacer.",
                routine: ["Feuilles de papier sur la zone centrale.", "Je sers / Remise adverse.", "J'enchaîne : une balle à droite, puis une balle à gauche."],
                variable: "Ajoute de l'effet latéral pour obliger ton adversaire à se déplacer plus vite.",
                conseils: ["Orienter mes épaules vers la zone visée.", "Accompagne ton geste jusqu'au bout.", "Effet latéral : frotte la balle sur le côté."],
                reussite: "Réaliser cet enchaînement sur plus de 4 balles 3 fois d’affilées."
            },
            { 
                title: "Fond droit", 
                objectif: "Maîtriser la rupture de profondeur (Long vers Court)",
                constat: "Tu joues essentiellement en fond de table à droite. Ton adversaire s'habitue à ta longueur de balle.",
                strategie: "Fixe ton adversaire au fond de la table avec une balle longue, puis crée une rupture brutale avec un coupé à droite pour le prendre de vitesse.",
                routine: ["Je sers.", "Remise adverse.", "Ton coup : Balle longue en fond de table à droite.", "Remise adverse.", "Ton coup : Coupé à droite, juste derrière le filet."],
                variable: "Après ta balle longue au fond droit, joue ton coupé dans le côté opposé (court à gauche).",
                conseils: ["Garde les jambes fléchies pour basculer ton poids vers l'avant.", "Pour le coupé : palette parallèle, frotte par-dessous, mouvement rapide et sec."],
                reussite: "Réaliser cet enchaînement 5 fois d'affilée sans faute."
            }
        ];

        const pCanvas = document.getElementById('pingCanvas');
        const pCtx = pCanvas.getContext('2d');

        function initPingCanvas() {
            const container = pCanvas.parentElement;
            pCanvas.width = container.clientWidth;
            pCanvas.height = container.clientHeight;
        }

        function handleImpact(e) {
            if (count >= 10) return;
            const rect = pCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            pCtx.beginPath(); pCtx.arc(x, y, 16, 0, Math.PI*2);
            pCtx.fillStyle = "#fbbf24"; pCtx.fill();
            pCtx.strokeStyle = "white"; pCtx.lineWidth = 3; pCtx.stroke();

            // Col 0 = Court (Gauche), Col 1 = Fond (Droite)
            const col = Math.floor(x / (pCanvas.width / 2));
            // Row 0-3 = Les 4 lignes verticales
            const row = Math.floor(y / (pCanvas.height / 4));
            const zoneIdx = (col * 4) + row;
            
            if (zoneIdx >= 0 && zoneIdx < 8) {
                impacts[zoneIdx]++;
                count++;
                document.getElementById('counter').innerText = count;
                if (count === 10) setTimeout(showStats, 400);
            }
        }

        function showStats() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('stats-view').classList.remove('hidden');
            const list = document.getElementById('stats-list');
            list.innerHTML = "";
            let maxVal = Math.max(...impacts);
            let bestIdx = impacts.indexOf(maxVal);

            impacts.forEach((val, i) => {
                if (val > 0) {
                    const div = document.createElement('div');
                    div.className = `p-4 rounded-2xl border flex justify-between items-center ${i === bestIdx ? 'bg-blue-600 text-white border-blue-600 font-bold' : 'bg-white text-slate-500'}`;
                    div.innerHTML = `<span class="text-xs uppercase italic">${zoneDisplayNames[i]}</span><span class="text-lg font-black">${val*10}%</span>`;
                    list.appendChild(div);
                }
            });
            document.getElementById('best-zone-name').innerText = zoneDisplayNames[bestIdx];
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function goToSituation() {
            let bestIdx = impacts.indexOf(Math.max(...impacts));
            const s = situations[bestIdx];
            document.getElementById('stats-view').classList.add('hidden');
            document.getElementById('situation-view').classList.remove('hidden');
            
            document.getElementById('situ-title').innerText = s.title;
            document.getElementById('situ-objectif').innerText = `Objectif : ${s.objectif}`;
            document.getElementById('situ-constat').innerText = s.constat;
            document.getElementById('situ-strategie').innerText = s.strategie;
            document.getElementById('situ-reussite').innerText = s.reussite;
            document.getElementById('situ-variable').innerHTML = `<span class="uppercase">Variable + :</span> ${s.variable}`;

            const routineEl = document.getElementById('situ-routine');
            routineEl.innerHTML = s.routine.map(item => `<div class="flex gap-2"><span>•</span><span>${item}</span></div>`).join('');

            const conseilsEl = document.getElementById('situ-conseils');
            conseilsEl.innerHTML = s.conseils.map(item => `<li>${item}</li>`).join('');
        }

        function clearGame() {
            count = 0; impacts = Array(8).fill(0);
            document.getElementById('counter').innerText = "0";
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('stats-view').classList.add('hidden');
            document.getElementById('situation-view').classList.add('hidden');
            setTimeout(initPingCanvas, 50);
        }

        pCanvas.addEventListener('mousedown', handleImpact);
        pCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleImpact(e); }, {passive:false});
        window.onload = initPingCanvas;
        window.onresize = initPingCanvas;
    </script>
</body>
</html>
